version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: swasthya_postgres
    restart: always
    environment:
      - POSTGRES_DB=swasthya_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d swasthya_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
